name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./gradlew build -x test

      - name: SCP JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/challenge8282/"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            echo "📦 Move to project folder"

            if [ ! -d "challenge8282" ]; then
              echo "📥 Clone repo (first time only)"
              git clone https://github.com/YOUR_REPO/challenge8282.git
            fi

            cd challenge8282

            echo "🔄 Pull latest code"
            git pull origin main

            echo "🛑 Stop containers"
            docker compose down || true

            echo "🚀 Build & Run containers"
            docker compose up -d --build

            echo "✅ Deploy finished"