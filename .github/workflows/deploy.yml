name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            # Docker 설치 확인 및 설치
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo dnf install docker -y
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi

            # Docker 서비스 실행 확인
            sudo systemctl start docker || true

            # Docker Compose 플러그인 설치 확인 및 설치
            if ! docker compose version &> /dev/null 2>&1; then
              echo "Installing Docker Compose plugin..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # Docker Buildx 플러그인 설치 확인 및 설치
            if ! docker buildx version &> /dev/null 2>&1; then
              echo "Installing Docker Buildx plugin..."
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -L "https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-amd64" -o /usr/local/lib/docker/cli-plugins/docker-buildx
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
            fi

            cd challenge8282
            echo "Pull latest code"
            git pull

            echo "Stop containers"
            docker compose down || true

            echo "Build & Run containers"
            docker compose up -d --build